name: integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install libpq-dev
        run: sudo apt-get install -y libpq-dev

      - name: Build C++ libraries
        run: |
          cmake -B market-data-svc/build -S market-data-svc
          cmake --build market-data-svc/build --target marketdata market_data_svc -j4
          cmake -B risk-svc/build -S risk-svc
          cmake --build risk-svc/build --target riskcalc -j4

      - name: Build Go services
        run: |
          cd order-svc && go build ./cmd/server
          cd ../risk-svc && go build ./cmd/server

      - name: Start stack
        working-directory: infra
        run: docker compose up -d --wait
        timeout-minutes: 5

      - name: Install smoke test deps
        run: cd python && uv sync --extra dev

      - name: Run smoke test
        run: cd python && uv run python smoke_test.py

      - name: Dump logs on failure
        if: failure()
        working-directory: infra
        run: docker compose logs

      - name: Tear down
        if: always()
        working-directory: infra
        run: docker compose down -v
