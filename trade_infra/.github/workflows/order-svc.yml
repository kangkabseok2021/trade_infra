name: order-svc

on:
  push:
    paths: ["order-svc/**"]
  pull_request:
    paths: ["order-svc/**"]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: trade_infra_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-retries 10
        ports: ["5432:5432"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Apply schema
        run: psql postgresql://postgres:postgres@localhost:5432/trade_infra_test -f sql/schema.sql

      - name: Run tests
        working-directory: order-svc
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/trade_infra_test?sslmode=disable
        run: go test ./... -v
